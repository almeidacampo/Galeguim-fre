<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "Frete Control",
  short_name: "Frete",
  description: "Gestão de fretes e gastos",
  start_url: ".",
  display: "standalone",
  background_color: "#0d1117",
  theme_color: "#0d1117",
  orientation: "portrait",
  icons: [
    { src: generateIcon(192), sizes: "192x192", type: "image/png", purpose: "any maskable" },
    { src: generateIcon(512), sizes: "512x512", type: "image/png", purpose: "any maskable" }
  ]
};
function generateIcon(size) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  // Background
  const grad = ctx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0,'#1a2332'); grad.addColorStop(1,'#0d1117');
  ctx.fillStyle = grad;
  const r = size*0.18;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);
  ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size);
  ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r);
  ctx.quadraticCurveTo(0,0,r,0);
  ctx.fill();

  // Draw Pampa car
  const s = size/100;
  ctx.save();
  ctx.translate(size*0.08, size*0.28);
  const sc = size*0.85;
  // Body
  ctx.fillStyle='#ef4444';
  ctx.fillRect(2*s, 42*s, 80*s, 28*s);
  // Cab
  ctx.beginPath();
  ctx.moveTo(8*s,42*s); ctx.lineTo(14*s,18*s);
  ctx.lineTo(52*s,18*s); ctx.lineTo(60*s,42*s);
  ctx.fill();
  // Windshield
  ctx.fillStyle='#93c5fd';
  ctx.globalAlpha=0.85;
  ctx.beginPath();
  ctx.moveTo(17*s,40*s); ctx.lineTo(20*s,22*s);
  ctx.lineTo(48*s,22*s); ctx.lineTo(54*s,40*s);
  ctx.fill();
  ctx.globalAlpha=1;
  // Bed top
  ctx.fillStyle='#dc2626';
  ctx.fillRect(60*s,22*s,22*s,20*s);
  // Wheels
  ctx.fillStyle='#1f2937';
  ctx.beginPath(); ctx.arc(22*s,70*s,13*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(65*s,70*s,13*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#6b7280';
  ctx.beginPath(); ctx.arc(22*s,70*s,6*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(65*s,70*s,6*s,0,Math.PI*2); ctx.fill();
  // Headlight
  ctx.fillStyle='#fde68a';
  ctx.fillRect(2*s,46*s,6*s,7*s);
  ctx.restore();
  return c.toDataURL('image/png');
}
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overscroll-behavior:none;}
input,button,select{font-family:inherit;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0d1117;} ::-webkit-scrollbar-thumb{background:#21262d;border-radius:2px;}

#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;}

/* Header */
.header{background:linear-gradient(135deg,#1a2332 0%,#0d1117 100%);padding:env(safe-area-inset-top,0) 20px 0;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:10;}
.header-top{display:flex;align-items:center;gap:12px;padding-top:max(16px,env(safe-area-inset-top,16px));padding-bottom:16px;}
.logo-box{width:42px;height:42px;background:linear-gradient(135deg,#b91c1c,#7f1d1d);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.app-name{font-size:18px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(90deg,#ef4444,#f97316,#facc15,#22c55e,#3b82f6,#a78bfa,#ef4444);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:nomeColorido 3s linear infinite;}
@keyframes nomeColorido{0%{background-position:0% center}100%{background-position:200% center}}
.app-sub{font-size:11px;color:#6e7681;}
.tabs{display:flex;}
.tab{flex:1;padding:10px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:#6e7681;font-size:12px;font-weight:400;cursor:pointer;transition:all .2s;}
.tab.active{border-bottom-color:#22c55e;color:#22c55e;font-weight:700;}

/* Content */
.content{padding:16px 16px 100px;}

/* Nav day/month */
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.btn-nav{background:#21262d;border:none;color:#e6edf3;width:36px;height:36px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-nav:disabled{opacity:.3;cursor:default;}
.nav-label{font-size:15px;font-weight:700;text-align:center;}
.nav-sub{font-size:11px;color:#6e7681;text-align:center;}

/* Cards stats */
.cards-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
.card-stat{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:12px 8px;text-align:center;}
.card-stat-icon{font-size:18px;}
.card-stat-val{font-size:12px;font-weight:800;margin-top:4px;word-break:break-all;}
.card-stat-val.big{font-size:13px;}
.card-stat-label{font-size:10px;color:#6e7681;margin-top:2px;}

/* Action buttons */
.btn-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.btn-add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:16px 10px;border-radius:14px;border:2px solid;font-size:13px;font-weight:700;cursor:pointer;}
.btn-add.green{background:#22c55e15;border-color:#22c55e33;color:#22c55e;}
.btn-add.red{background:#ef444415;border-color:#ef444433;color:#ef4444;}
.btn-add-icon{font-size:22px;}

/* Section title */
.section-title{font-size:12px;font-weight:700;color:#6e7681;margin-bottom:10px;margin-top:4px;letter-spacing:.5px;}

/* Item cards */
.item-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.item-icon-box{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.item-right{text-align:right;flex-shrink:0;}
.item-val{font-size:14px;font-weight:800;}
.btn-del{background:#ef444422;border:1px solid #ef444444;color:#ef4444;font-size:18px;cursor:pointer;padding:8px 12px;border-radius:8px;display:block;margin-top:4px;min-width:40px;min-height:40px;line-height:1;}
.btn-del:active{background:#ef4444;color:#fff;transform:scale(0.9);}
.item-card{transition:opacity 0.2s,transform 0.2s;}
.item-card.removendo{opacity:0;transform:translateX(60px);}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:#6e7681;}
.empty-icon{font-size:40px;margin-bottom:8px;}
.empty-text{font-size:14px;}
.empty-sub{font-size:12px;margin-top:4px;}

/* Monthly big cards */
.cards-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.card-big{background:#161b22;border:1px solid #21262d;border-radius:14px;padding:16px 14px;}
.card-big-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.card-big-label{font-size:11px;color:#6e7681;font-weight:600;}
.card-big-val{font-size:20px;font-weight:800;}
.card-big-sub{font-size:11px;color:#6e7681;margin-top:4px;}

.card-liquido{border-radius:14px;padding:16px 20px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.card-liquido-label{font-size:11px;color:#6e7681;margin-bottom:2px;}
.card-liquido-val{font-size:28px;font-weight:800;}

/* Bar chart */
.chart-box{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:16px;margin-bottom:16px;}
.chart-title{font-size:12px;color:#6e7681;margin-bottom:12px;font-weight:600;}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:60px;}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.chart-bar{width:100%;border-radius:3px 3px 0 0;transition:height .4s ease;}
.chart-bar-label{font-size:9px;color:#555;white-space:nowrap;}

/* Gasto breakdown */
.breakdown-box{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:16px;margin-bottom:16px;}
.breakdown-row{margin-bottom:10px;}
.breakdown-header{display:flex;justify-content:space-between;margin-bottom:4px;}
.breakdown-label{font-size:12px;}
.breakdown-val{font-size:12px;font-weight:700;}
.progress-track{height:6px;background:#21262d;border-radius:4px;}
.progress-bar{height:100%;border-radius:4px;transition:width .5s;}

/* Stats 3 */
.cards-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.card-mini{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:12px 10px;text-align:center;}
.card-mini-val{font-size:16px;font-weight:800;}
.card-mini-label{font-size:10px;color:#6e7681;margin-top:2px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;z-index:100;}
.modal-box{background:#161b22;border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:max(40px,env(safe-area-inset-bottom,40px));width:100%;border:1px solid #21262d;border-bottom:none;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;}
.modal-label{font-size:12px;color:#6e7681;margin-bottom:6px;font-weight:600;}
.modal-input{width:100%;background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:12px 14px;color:#e6edf3;font-size:15px;outline:none;}
.modal-input.big{font-size:26px;font-weight:700;}
.modal-input.green{color:#22c55e;}
.modal-input.red{color:#ef4444;}
.tipo-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.tipo-btn{padding:16px 10px;border-radius:12px;border:2px solid #21262d;background:#0d1117;color:#6e7681;cursor:pointer;font-size:14px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px;}
.tipo-btn-icon{font-size:28px;}
.btn-salvar{width:100%;padding:16px;border-radius:12px;border:none;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px;}
.btn-salvar.green{background:linear-gradient(135deg,#22c55e,#16a34a);}
.btn-salvar.red{background:linear-gradient(135deg,#ef4444,#dc2626);}
</style>

          <path d="M10 22 L16 8 L48 8 L56 22 Z" fill="#ef4444"/>

          <line x1="56" y1="11" x2="56" y2="22" stroke="#991b1b" stroke-width="2"/>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const KEY = 'frete-app-v2';
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {viagens:[],gastos:[]}; }
  catch { return {viagens:[],gastos:[]}; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(DB)); }
let DB = load();

// ── State ─────────────────────────────────────────────────────────────────────
let aba = 'hoje';
let diaVis = todayStr();
let mesVis = todayStr().slice(0,7);
let modalTipo = null;
let modalGastoTipo = 'combustivel';

function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtDate(iso) { const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function monthLabel(k) {
  const [y,m]=k.split('-');
  return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+m-1]+'/'+y;
}
function fmt(v) {
  return 'R$ '+Number(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function setAba(a) {
  aba = a;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===a));
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('content');
  if (aba==='hoje') el.innerHTML = renderHoje();
  else if (aba==='mes') el.innerHTML = renderMes();
  else el.innerHTML = renderHistorico();
}

function renderHoje() {
  const viagens = DB.viagens.filter(v=>v.data===diaVis).sort((a,b)=>b.id-a.id);
  const gastos  = DB.gastos.filter(g=>g.data===diaVis).sort((a,b)=>b.id-a.id);
  const receita = viagens.reduce((s,v)=>s+ +v.valor,0);
  const despesa = gastos.reduce((s,g)=>s+ +g.valor,0);
  const liquido = receita - despesa;
  const liqColor = liquido>=0?'#22c55e':'#ef4444';
  const isToday = diaVis===todayStr();
  const label = isToday?'Hoje':fmtDate(diaVis);

  let html = `
  <div class="nav-row">
    <button class="btn-nav" onclick="navDia(-1)">‹</button>
    <div><div class="nav-label">${label}</div><div class="nav-sub">${fmtDate(diaVis)}</div></div>
    <button class="btn-nav" onclick="navDia(1)" ${isToday?'disabled':''}>›</button>
  </div>
  <div class="cards-3">
    <div class="card-stat"><div class="card-stat-icon">💰</div><div class="card-stat-val" style="color:#22c55e">${fmt(receita)}</div><div class="card-stat-label">Receita</div></div>
    <div class="card-stat"><div class="card-stat-icon">💸</div><div class="card-stat-val" style="color:#ef4444">${fmt(despesa)}</div><div class="card-stat-label">Gastos</div></div>
    <div class="card-stat"><div class="card-stat-icon">📈</div><div class="card-stat-val big" style="color:${liqColor}">${fmt(liquido)}</div><div class="card-stat-label">Líquido</div></div>
  </div>
  <div class="btn-actions">
    <button class="btn-add green" onclick="abrirModal('viagem')"><span class="btn-add-icon">+</span><span>Nova Entrega</span></button>
    <button class="btn-add red" onclick="abrirModal('gasto')"><span class="btn-add-icon">+</span><span>Registrar Gasto</span></button>
  </div>`;

  if (viagens.length>0) {
    html += `<div class="section-title">Entregas do dia (${viagens.length})</div>`;
    viagens.forEach(v=>{
      html += itemCard('🚗', v.descricao||'Entrega', fmtDate(v.data), fmt(v.valor), '#22c55e', '#22c55e', 'viagem', v.id);
    });
  }
  if (gastos.length>0) {
    html += `<div class="section-title" style="margin-top:8px">Gastos do dia (${gastos.length})</div>`;
    gastos.forEach(g=>{
      const ic = g.tipo==='combustivel'?'⛽':'🔧';
      const cor = g.tipo==='combustivel'?'#f97316':'#ef4444';
      html += itemCard(ic, g.descricao||g.tipo, fmtDate(g.data), fmt(g.valor), '#ef4444', cor, 'gasto', g.id);
    });
  }
  if (viagens.length===0 && gastos.length===0) {
    html += `<div class="empty"><div class="empty-icon">🚗</div><div class="empty-text">Nenhum registro neste dia</div><div class="empty-sub">Adicione sua primeira entrega!</div></div>`;
  }
  return html;
}

function renderMes() {
  const viagens = DB.viagens.filter(v=>v.data.startsWith(mesVis));
  const gastos  = DB.gastos.filter(g=>g.data.startsWith(mesVis));
  const receita = viagens.reduce((s,v)=>s+ +v.valor,0);
  const despesa = gastos.reduce((s,g)=>s+ +g.valor,0);
  const liquido = receita - despesa;
  const liqColor = liquido>=0?'#22c55e':'#ef4444';
  const liqIcon  = liquido>=0?'📈':'📉';
  const isMesAtual = mesVis===todayStr().slice(0,7);

  // dias com receita
  const diasMap = {};
  viagens.forEach(v=>{diasMap[v.data]=(diasMap[v.data]||0)+ +v.valor;});
  const diasTrab = Object.keys(diasMap).length;
  const ticketMedio = viagens.length>0?receita/viagens.length:0;
  const mediaDia = diasTrab>0?receita/diasTrab:0;

  // bar chart 6 months
  const bars = [];
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    const k=d.toISOString().slice(0,7);
    const rec=DB.viagens.filter(v=>v.data.startsWith(k)).reduce((s,v)=>s+ +v.valor,0);
    const desp=DB.gastos.filter(g=>g.data.startsWith(k)).reduce((s,g)=>s+ +g.valor,0);
    bars.push({l:monthLabel(k),v:Math.max(0,rec-desp),cur:k===mesVis});
  }
  const maxBar=Math.max(...bars.map(b=>b.v),1);

  let barsHtml='';
  bars.forEach(b=>{
    const h=Math.max(2,(b.v/maxBar)*52);
    barsHtml+=`<div class="chart-bar-col"><div class="chart-bar" style="height:${h}px;background:#22c55e;opacity:${b.cur?1:.35}"></div><div class="chart-bar-label">${b.l}</div></div>`;
  });

  // breakdown
  const comb = gastos.filter(g=>g.tipo==='combustivel').reduce((s,g)=>s+ +g.valor,0);
  const man  = gastos.filter(g=>g.tipo==='manutencao').reduce((s,g)=>s+ +g.valor,0);

  let breakdownHtml='';
  if(gastos.length>0){
    [[comb,'⛽ Combustível','#f97316'],[man,'🔧 Manutenção','#ef4444']].forEach(([val,label,cor])=>{
      if(val===0)return;
      const pct=despesa>0?(val/despesa)*100:0;
      breakdownHtml+=`<div class="breakdown-row">
        <div class="breakdown-header"><span class="breakdown-label">${label}</span><span class="breakdown-val" style="color:${cor}">${fmt(val)}</span></div>
        <div class="progress-track"><div class="progress-bar" style="width:${pct}%;background:${cor}"></div></div>
      </div>`;
    });
  }

  return `
  <div class="nav-row">
    <button class="btn-nav" onclick="navMes(-1)">‹</button>
    <div class="nav-label">${monthLabel(mesVis)}</div>
    <button class="btn-nav" onclick="navMes(1)" ${isMesAtual?'disabled':''}>›</button>
  </div>
  <div class="cards-2">
    <div class="card-big">
      <div class="card-big-header"><span class="card-big-label">Receita Bruta</span><span>💰</span></div>
      <div class="card-big-val" style="color:#22c55e">${fmt(receita)}</div>
      <div class="card-big-sub">${viagens.length} entregas</div>
    </div>
    <div class="card-big">
      <div class="card-big-header"><span class="card-big-label">Total Gastos</span><span>💸</span></div>
      <div class="card-big-val" style="color:#ef4444">${fmt(despesa)}</div>
      <div class="card-big-sub">${gastos.length} registros</div>
    </div>
  </div>
  <div class="card-liquido" style="background:linear-gradient(135deg,#1a2a1a,#1a2332);border:2px solid ${liqColor}">
    <div><div class="card-liquido-label">LUCRO LÍQUIDO DO MÊS</div><div class="card-liquido-val" style="color:${liqColor}">${fmt(liquido)}</div></div>
    <div style="font-size:36px">${liqIcon}</div>
  </div>
  <div class="chart-box">
    <div class="chart-title">LUCRO LÍQUIDO — ÚLTIMOS 6 MESES</div>
    <div class="chart-bars">${barsHtml}</div>
  </div>
  ${breakdownHtml?`<div class="breakdown-box"><div class="chart-title">GASTOS POR CATEGORIA</div>${breakdownHtml}</div>`:''}
  <div class="cards-stats">
    <div class="card-mini"><div class="card-mini-val" style="color:#22c55e">${fmt(mediaDia)}</div><div class="card-mini-label">Média/dia</div></div>
    <div class="card-mini"><div class="card-mini-val" style="color:#3b82f6">${diasTrab}</div><div class="card-mini-label">Dias trabalhados</div></div>
    <div class="card-mini"><div class="card-mini-val" style="color:#a78bfa">${fmt(ticketMedio)}</div><div class="card-mini-label">Ticket médio</div></div>
  </div>`;
}

function renderHistorico() {
  const viagens = [...DB.viagens].sort((a,b)=>b.id-a.id);
  const gastos  = [...DB.gastos].sort((a,b)=>b.id-a.id);
  let html = `<div class="section-title">Todas as entregas (${viagens.length})</div>`;
  if(viagens.length===0) html+=`<div style="text-align:center;padding:16px;color:#6e7681;font-size:13px">Nenhuma entrega</div>`;
  viagens.forEach(v=>{
    html+=itemCard('🚗',v.descricao||'Entrega',fmtDate(v.data),fmt(v.valor),'#22c55e','#22c55e','viagem',v.id);
  });
  html+=`<div class="section-title" style="margin-top:16px">Todos os gastos (${gastos.length})</div>`;
  if(gastos.length===0) html+=`<div style="text-align:center;padding:16px;color:#6e7681;font-size:13px">Nenhum gasto</div>`;
  gastos.forEach(g=>{
    const ic=g.tipo==='combustivel'?'⛽':'🔧';
    const cor=g.tipo==='combustivel'?'#f97316':'#ef4444';
    html+=itemCard(ic,g.descricao||(g.tipo==='combustivel'?'Combustível':'Manutenção'),fmtDate(g.data),fmt(g.valor),'#ef4444',cor,'gasto',g.id);
  });
  return html;
}

function itemCard(icon,titulo,sub,valor,corVal,corBadge,tipo,id) {
  return `<div class="item-card">
    <div class="item-icon-box" style="background:${corBadge}22">${icon}</div>
    <div class="item-info"><div class="item-title">${titulo}</div><div class="item-sub">${sub}</div></div>
    <div class="item-right"><div class="item-val" style="color:${corVal}">${valor}</div><button class="btn-del" data-tipo="${tipo}" data-id="${id}" onclick="deletarBtn(this)">🗑</button></div>
  </div>`;
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function navDia(d) {
  const dt = new Date(diaVis+'T12:00:00');
  dt.setDate(dt.getDate()+d);
  const s = dt.toISOString().slice(0,10);
  if(s<=todayStr()) { diaVis=s; render(); }
}
function navMes(d) {
  const dt = new Date(mesVis+'-01T12:00:00');
  dt.setMonth(dt.getMonth()+d);
  const s = dt.toISOString().slice(0,7);
  if(s<=todayStr().slice(0,7)) { mesVis=s; render(); }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function abrirModal(tipo) {
  modalTipo = tipo;
  modalGastoTipo = 'combustivel';
  document.getElementById('modal-valor').value='';
  document.getElementById('modal-valor').className='modal-input big '+(tipo==='viagem'?'green':'red');
  document.getElementById('modal-title').textContent = tipo==='viagem'?'🚗 Nova Entrega':'💸 Registrar Gasto';
  document.getElementById('btn-salvar').className='btn-salvar '+(tipo==='viagem'?'green':'red');

  const body = document.getElementById('modal-body');
  if(tipo==='viagem'){
    body.innerHTML=`
      <div class="modal-label">Descrição rápida (opcional)</div>
      <input class="modal-input" id="modal-desc" placeholder="Ex: Entrega centro, pacote..." style="margin-bottom:16px" autofocus/>`;
  } else {
    body.innerHTML=`
      <div class="modal-label">Tipo de gasto</div>
      <div class="tipo-btns">
        <button class="tipo-btn" id="btn-comb" onclick="setGastoTipo('combustivel')" style="border-color:#f97316;background:#f9741622;color:#f97316">
          <span class="tipo-btn-icon">⛽</span>Combustível
        </button>
        <button class="tipo-btn" id="btn-man" onclick="setGastoTipo('manutencao')">
          <span class="tipo-btn-icon">🔧</span>Manutenção
        </button>
      </div>`;
  }
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>{ const inp=document.getElementById('modal-valor'); if(inp) inp.focus(); },300);
}

function setGastoTipo(t) {
  modalGastoTipo=t;
  const bc=document.getElementById('btn-comb');
  const bm=document.getElementById('btn-man');
  bc.style.borderColor=t==='combustivel'?'#f97316':'#21262d';
  bc.style.background=t==='combustivel'?'#f9741622':'#0d1117';
  bc.style.color=t==='combustivel'?'#f97316':'#6e7681';
  bm.style.borderColor=t==='manutencao'?'#ef4444':'#21262d';
  bm.style.background=t==='manutencao'?'#ef444422':'#0d1117';
  bm.style.color=t==='manutencao'?'#ef4444':'#6e7681';
}

function closeModalOverlay(e) {
  if(e.target===document.getElementById('modal')) fecharModal();
}
function fecharModal() { document.getElementById('modal').style.display='none'; }

function salvar() {
  const val = parseFloat(document.getElementById('modal-valor').value);
  if(!val||val<=0) { document.getElementById('modal-valor').style.borderColor='#ef4444'; return; }
  const id = Date.now();
  if(modalTipo==='viagem'){
    const desc = (document.getElementById('modal-desc')||{}).value||'';
    DB.viagens.push({id, data:diaVis, valor:val, descricao:desc, tipo:'entrega'});
  } else {
    DB.gastos.push({id, data:diaVis, valor:val, tipo:modalGastoTipo, descricao:''});
  }
  save();
  fecharModal();
  render();
}

// ── Delete ────────────────────────────────────────────────────────────────────
function deletarBtn(btn) {
  const tipo = btn.getAttribute('data-tipo');
  const id = Number(btn.getAttribute('data-id'));
  if(!tipo || !id) { alert('Erro: id nao encontrado'); return; }
  const card = btn.closest('.item-card');
  if(card) {
    card.classList.add('removendo');
    setTimeout(()=>{ deletar(tipo, id); }, 200);
  } else {
    deletar(tipo, id);
  }
}
function deletar(tipo, id) {
  if(tipo==='viagem') DB.viagens=DB.viagens.filter(v=>v.id!==id);
  else DB.gastos=DB.gastos.filter(g=>g.id!==id);
  save();
  render();
}

// ── Enter to save ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{ if(e.key==='Enter'&&document.getElementById('modal').style.display!=='none') salvar(); });

// ── PWA install ───────────────────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  // Generate and inject manifest
  const iconUrl = generateIcon(192);
  const icon512 = generateIcon(512);
  const manifest = {
    name:"Galeguim dos Frete",short_name:"Galeguim",
    description:"Gestão de fretes e gastos",
    start_url:".",display:"standalone",
    background_color:"#0d1117",theme_color:"#0d1117",
    orientation:"portrait",
    icons:[
      {src:iconUrl,sizes:"192x192",type:"image/png",purpose:"any maskable"},
      {src:icon512,sizes:"512x512",type:"image/png",purpose:"any maskable"}
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel='manifest'; link.href=url;
  document.head.appendChild(link);

  // Apple touch icon
  const appleIcon = document.createElement('link');
  appleIcon.rel='apple-touch-icon'; appleIcon.href=generateIcon(180);
  document.head.appendChild(appleIcon);

  // Service Worker for offline
  if('serviceWorker' in navigator){
    const swCode=`
      const CACHE='frete-v1';
      self.addEventListener('install',e=>{ self.skipWaiting(); });
      self.addEventListener('fetch',e=>{ e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))); });
    `;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
